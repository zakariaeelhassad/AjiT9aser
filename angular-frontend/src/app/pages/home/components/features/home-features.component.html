<section class="py-20 px-6">
  <div class="max-w-7xl mx-auto">
    <div class="flex flex-col items-center gap-3 mb-12">
      <span class="badge badge-purple">How It Works</span>
      <h2 class="text-4xl font-black tracking-tight">Three Steps to Glory</h2>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      @for (f of features; track f.title) {
        <div class="glass-card p-8 flex flex-col gap-4 relative overflow-hidden group">
          <div class="w-[52px] h-[52px] rounded-xl flex items-center justify-center text-2xl border"
               [style.background]="iconBg[f.color]"
               [style.borderColor]="iconBorder[f.color]">{{ f.icon }}</div>
          <h3 class="text-lg font-bold">{{ f.title }}</h3>
          <p class="text-slate-400 text-sm leading-relaxed">{{ f.desc }}</p>
          <div class="absolute bottom-0 left-0 right-0 h-[3px] opacity-0 group-hover:opacity-100 transition-opacity rounded-b-2xl"
               [style.background]="featureBar[f.color]"></div>
        </div>
      }
    </div>
  </div>
</section>
